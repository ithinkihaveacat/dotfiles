name: lint

on:
  push:
  pull_request:

jobs:
  shellcheck-shfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck and shfmt
        run: sudo apt-get install -y shellcheck shfmt

      - name: shellcheck
        run: |
          grep -rlE '^#!.*\bba?sh\b' bin/ skills/*/scripts/ etc/macos/apply-defaults update \
            | grep -v '__pycache__' \
            | sort \
            | xargs shellcheck

      - name: shfmt
        run: |
          grep -rlE '^#!.*\bba?sh\b' bin/ skills/*/scripts/ etc/macos/apply-defaults update \
            | grep -v '__pycache__' \
            | sort \
            | xargs shfmt -d -i 2 -ci

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: ruff
        run: |
          grep -rlE '^#!.*python|^#!/usr/bin/env -S uv run' bin/ skills/*/scripts/ \
            | grep -v '__pycache__' \
            | sort \
            | xargs uvx ruff check
