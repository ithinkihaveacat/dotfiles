name: lint

on:
  push:
  pull_request:

jobs:
  shellcheck-shfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          scversion="v0.11.0"
          wget -qO- "https://github.com/koalaman/shellcheck/releases/download/${scversion}/shellcheck-${scversion}.linux.x86_64.tar.xz" | tar -xJv
          sudo cp "shellcheck-${scversion}/shellcheck" /usr/local/bin/

      - name: Install shfmt
        run: sudo apt-get install -y shfmt

      - name: shellcheck
        run: |
          grep -rlE '^#!.*\bba?sh\b' bin/ skills/*/scripts/ etc/macos/apply-defaults update \
            | grep -v '__pycache__' \
            | sort \
            | xargs shellcheck

      - name: shfmt
        run: |
          grep -rlE '^#!.*\bba?sh\b' bin/ skills/*/scripts/ etc/macos/apply-defaults update \
            | grep -v '__pycache__' \
            | sort \
            | xargs shfmt -d -i 2 -ci

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: ruff
        run: |
          grep -rlE '^#!.*python|^#!/usr/bin/env -S uv run' bin/ skills/*/scripts/ \
            | grep -v '__pycache__' \
            | sort \
            | xargs uvx ruff check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install libxml2-utils
        run: sudo apt-get install -y libxml2-utils

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Run tests
        env:
          GEMINI_API_KEY: ""
        run: prove tests/*/test-*

  fish-indent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Fish
        run: |
          sudo apt-add-repository ppa:fish-shell/release-3 -y
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Check formatting with fish_indent
        run: |
          find . -name "*.fish" | xargs -r fish_indent --check
