name: lint

on:
  push:
  pull_request:

jobs:
  shellcheck-shfmt:
    # Same-repo PRs are already covered by the push event; only fork PRs
    # (which do not trigger push here) need the pull_request run.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          scversion="v0.11.0"
          wget -qO- "https://github.com/koalaman/shellcheck/releases/download/${scversion}/shellcheck-${scversion}.linux.x86_64.tar.xz" | tar -xJv
          sudo cp "shellcheck-${scversion}/shellcheck" /usr/local/bin/

      - name: Install shfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y shfmt

      - name: shellcheck
        run: |
          grep -rlE '^#!.*\bba?sh\b' bin/ skills/*/scripts/ etc/macos/apply-defaults install.sh \
            | grep -v '__pycache__' \
            | sort \
            | xargs shellcheck

      - name: shfmt
        run: |
          grep -rlE '^#!.*\bba?sh\b' bin/ skills/*/scripts/ etc/macos/apply-defaults install.sh \
            | grep -v '__pycache__' \
            | sort \
            | xargs shfmt -d -i 2 -ci

  ruff:
    # Same-repo PRs are already covered by the push event; only fork PRs
    # (which do not trigger push here) need the pull_request run.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: ruff
        run: |
          grep -rlE '^#!.*python|^#!/usr/bin/env -S uv run' bin/ skills/*/scripts/ \
            | grep -v '__pycache__' \
            | sort \
            | xargs uvx ruff check

  test:
    # Same-repo PRs are already covered by the push event; only fork PRs
    # (which do not trigger push here) need the pull_request run.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils imagemagick shfmt

      - name: Install shellcheck
        run: |
          scversion="v0.11.0"
          wget -qO- "https://github.com/koalaman/shellcheck/releases/download/${scversion}/shellcheck-${scversion}.linux.x86_64.tar.xz" | tar -xJv
          sudo cp "shellcheck-${scversion}/shellcheck" /usr/local/bin/

      - name: Run tests
        env:
          # Empty key forces heavy, non-deterministic external LLM tests to skip gracefully.
          # Tip for local sandboxed runs: use 'UV_OFFLINE=1' to bypass registry auth (401) errors.
          GEMINI_API_KEY: ""
        run: prove tests/test-* skills/*/tests/test-*

  fish-indent:
    # Same-repo PRs are already covered by the push event; only fork PRs
    # (which do not trigger push here) need the pull_request run.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Fish
        run: |
          sudo apt-add-repository ppa:fish-shell/release-3 -y
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Check formatting with fish_indent
        run: |
          find . -name "*.fish" | xargs -r fish_indent --check
